services:
  app:
    build: .
    image: cultural-mood-tracker:local
    ports:
      - "8501:8501"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-sentence-transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      ENABLE_QUERY_REWRITING: ${ENABLE_QUERY_REWRITING:-true}
      PROMPT_VARIANT: ${PROMPT_VARIANT:-strict}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-5}
      RETRIEVAL_STRATEGY: ${RETRIEVAL_STRATEGY:-bm25}
      CULTURAL_MOOD_TRACKER_DLT_DB_PATH: /app/runtime/cultural_mood_tracker_pipeline.duckdb
    volumes:
      - cultural-mood-tracker-runtime:/app/runtime
      - cultural-mood-tracker-artifacts:/app/artifacts
      - model-cache:/home/culturaltracker/.cache/huggingface
    restart: unless-stopped

  ingest-tmdb:
    build: .
    image: cultural-mood-tracker:local
    command: ["python", "scripts/ingest.py", "--source", "tmdb"]
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_LANGUAGE: ${TMDB_LANGUAGE:-en-US}
      TMDB_START_DATE: ${TMDB_START_DATE:-2025-01-01}
      TMDB_END_DATE: ${TMDB_END_DATE:-2026-12-31}
      TMDB_MOVIE_LIMIT: ${TMDB_MOVIE_LIMIT:-100}
      TMDB_TV_LIMIT: ${TMDB_TV_LIMIT:-100}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-sentence-transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      CULTURAL_MOOD_TRACKER_DLT_DB_PATH: /app/runtime/cultural_mood_tracker_pipeline.duckdb
    volumes:
      - cultural-mood-tracker-runtime:/app/runtime
      - cultural-mood-tracker-artifacts:/app/artifacts
      - model-cache:/home/culturaltracker/.cache/huggingface
    profiles: ["tools"]

volumes:
  cultural-mood-tracker-runtime:
  cultural-mood-tracker-artifacts:
  model-cache:
