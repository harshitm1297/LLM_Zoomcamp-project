name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install "dlt[duckdb]==1.29.0" duckdb==1.5.4 numpy==2.4.3 ruff==0.15.7
      - run: ruff check .
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
